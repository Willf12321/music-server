services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  php:
    build: ./docker/php
    volumes:
      - .:/var/www/html

  python-sidecar:
    build:
      context: ./sidecar
      dockerfile: ../docker/python-sidecar/Dockerfile
    ports:
      - "8001:8001"
    # sidecar/.env should be created from sidecar/.env.example and is gitignored.
    env_file:
      - ./sidecar/.env
    volumes:
      # Persists the Tidal OAuth session so login only needs to happen once.
      - ./sidecar/tidal_session.json:/app/tidal_session.json

  mpd:
    build: ./docker/mpd
    ports:
      - "6600:6600"
    environment:
      MPD_AUDIO_DEVICE: '${MPD_AUDIO_DEVICE}'
      MPD_MIXER_TYPE: '${MPD_MIXER_TYPE}'
      MPD_MIXER_CONTROL: '${MPD_MIXER_CONTROL}'
    volumes:
      - ./music:/music
      - mpd_data:/var/lib/mpd
    devices:
      # Passes the ALSA sound device directly into the container,
      # giving MPD raw hardware access without PulseAudio in the path.
      - /dev/snd:/dev/snd
    group_add:
      # The audio group (GID 29 on most Linux hosts) owns /dev/snd.
      # Without this the container user cannot open the ALSA device.
      - "29"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD}'
      MYSQL_DATABASE: music_server
      MYSQL_USER: music
      MYSQL_PASSWORD: '${MYSQL_PASSWORD}'
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

volumes:
  mpd_data:
  mysql_data:
