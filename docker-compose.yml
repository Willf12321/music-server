services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  php:
    build: ./docker/php
    volumes:
      - .:/var/www/html

  python-sidecar:
    build:
      context: ./sidecar
      dockerfile: ../docker/python-sidecar/Dockerfile
    ports:
      - "8001:8001"
    # sidecar/.env should be created from sidecar/.env.example and is gitignored.
    env_file:
      - ./sidecar/.env
    volumes:
      # Persists the Tidal OAuth session so login only needs to happen once.
      - ./sidecar/tidal_session.json:/app/tidal_session.json

  mpd:
    build: ./docker/mpd
    ports:
      - "6600:6600"
    volumes:
      - ./music:/music
    devices:
      # Passes the ALSA sound device directly into the container,
      # giving MPD raw hardware access without PulseAudio in the path.
      - /dev/snd:/dev/snd

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
