music_directory    "/music"
db_file            "/var/lib/mpd/database"
log_file           "/var/log/mpd/mpd.log"
pid_file           "/var/run/mpd/pid"

bind_to_address    "0.0.0.0"
port               "6600"

# PulseAudio is intentionally not used here.
# Direct ALSA access gives the cleanest signal path into the mixing desk,
# avoiding the resampling and mixing PulseAudio introduces.
# plughw (rather than hw) lets ALSA handle format/rate conversion automatically,
# which avoids ACK errors on hardware that doesn't support the exact format requested.
# On the NUC (production), change this to hw:0,0 for direct ALSA access.
audio_output {
    type        "alsa"
    name        "Output"
    device      "plughw:1,2"
    # Software mixer lets MPD own volume control rather than relying on the
    # hardware ALSA mixer, which is often absent or unsupported on dev hardware.
    mixer_type  "software"
}
