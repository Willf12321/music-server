music_directory    "/music"
db_file            "/var/lib/mpd/database"
log_file           "/var/log/mpd/mpd.log"
pid_file           "/var/run/mpd/pid"

bind_to_address    "0.0.0.0"
port               "6600"

# PulseAudio is intentionally not used here.
# Direct ALSA access gives the cleanest signal path into the mixing desk,
# avoiding the resampling and mixing PulseAudio introduces.
audio_output {
    type        "alsa"
    name        "Output"
    device      "$MPD_AUDIO_DEVICE"
    mixer_type  "$MPD_MIXER_TYPE"
}
